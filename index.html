<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimated Trade Value (ETV)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:#0A0A0A;--accent:#C8102E;--accent-light:#FFF0F2;--surface:#FFFFFF;
    --surface-2:#F5F4F0;--surface-3:#EDECEA;--ink:#0A0A0A;--ink-secondary:#5A5A5A;
    --ink-muted:#9A9A9A;--border:rgba(0,0,0,0.10);--border-strong:rgba(0,0,0,0.22);
    --success:#1A7A4A;--success-bg:#EBF8F1;--info:#1E5FA8;--info-bg:#EBF2FC;
    --font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-2);color:var(--ink);min-height:100vh;}
  .masthead{background:var(--primary);padding:20px 24px 18px;display:flex;align-items:center;justify-content:center;text-align:center;border-bottom:3px solid var(--accent);}
  .masthead-wordmark{font-family:var(--font-display);font-size:32px;color:#fff;letter-spacing:1.5px;line-height:1;}
  .masthead-wordmark span{color:var(--accent);}
  .masthead-sub{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:2px;padding-bottom:3px;}
  .container{max-width:1400px;margin:0 auto;padding:20px 16px;}

  /* WEIGHTS PANEL */
  .weights-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:20px;}
  .weights-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .section-label{font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-muted);border-top:1px solid var(--border);padding-top:12px;margin-bottom:10px;}
  .weights-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-muted);}
  .weights-actions{display:flex;gap:8px;}
  .btn{font-family:var(--font-body);font-size:12px;font-weight:600;padding:7px 16px;border-radius:6px;border:none;cursor:pointer;transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border-strong);}
  .weights-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
  .weight-item{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:12px;}
  .weight-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;display:block;}
  .weight-input-row{display:flex;align-items:center;gap:6px;}
  .weight-input{flex:1;background:var(--surface);border:1px solid var(--border-strong);border-radius:4px;padding:7px 10px;font-family:var(--font-mono);font-size:13px;color:var(--ink);outline:none;transition:border-color .15s;}
  .weight-input:focus{border-color:var(--accent);}
  .weight-suffix{font-family:var(--font-mono);font-size:12px;color:var(--ink-muted);}
  .total-weight-row{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;align-items:center;gap:10px;}
  .total-label{font-family:var(--font-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-muted);}
  .total-value{font-family:var(--font-display);font-size:22px;}
  .total-value.valid{color:var(--success);}.total-value.invalid{color:var(--accent);}

  /* CONTROLS */
  .controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .search-wrap{flex:1;min-width:220px;position:relative;}
  .search-wrap input{width:100%;font-family:var(--font-body);font-size:13px;padding:9px 14px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);color:var(--ink);outline:none;transition:border-color .15s;}
  .search-wrap input:focus{border-color:var(--accent);}
  .filter-sel{font-family:var(--font-body);font-size:13px;padding:9px 14px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);color:var(--ink);outline:none;cursor:pointer;min-width:160px;}
  .filter-sel:focus{border-color:var(--accent);}

  /* TABLE */
  .table-container{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  thead{background:var(--primary);}
  th{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.55);text-align:left;padding:13px 18px 11px;border-bottom:2px solid var(--accent);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s;}
  th:hover{color:#fff;}
  th.sorted{color:#fff;}
  th .sort-icon{display:inline-block;margin-left:5px;opacity:.4;}
  th.sorted .sort-icon{opacity:1;color:var(--accent);}
  td{padding:13px 18px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tbody tr{transition:background .1s;}
  tbody tr:hover{background:var(--surface-2);}
  tbody tr:last-child td{border-bottom:none;}
  .rank-cell{font-family:var(--font-display);font-size:18px;color:var(--ink-muted);width:50px;}
  .rank-cell.top-10{color:var(--accent);}
  .contract-badge{display:inline-block;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:3px;font-weight:500;text-transform:uppercase;}
  .badge-rookie{background:var(--info-bg);color:var(--info);}
  .badge-standard{background:var(--success-bg);color:var(--success);}
  .badge-max{background:var(--accent-light);color:var(--accent);}
  .badge-supermax{background:var(--accent-light);color:var(--accent);}
  .badge-veteran{background:var(--surface-3);color:var(--ink-secondary);}
  .badge-extension{background:#F0F9F4;color:#1A7A4A;}
  .badge-default{background:var(--surface-3);color:var(--ink-muted);}
  .player-name{font-weight:600;font-size:13px;}
  .team-cell{display:flex;align-items:center;gap:10px;}
  .team-logo{width:36px;height:36px;object-fit:contain;border-radius:4px;background:var(--surface-2);padding:2px;}
  .team-name-label{font-size:13px;color:var(--ink-secondary);}
  .etv-cell{border-radius:4px;padding:6px 10px;display:inline-block;min-width:64px;text-align:center;}
  .etv-value{font-family:var(--font-display);font-size:20px;color:var(--ink);letter-spacing:.5px;}
  .loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:var(--ink-muted);}
  .spinner{width:32px;height:32px;border:3px solid var(--surface-3);border-top:3px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:768px){.container{padding:12px;}.weights-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-wordmark">ESTIMATED <span>TRADE VALUE (ETV)</span></div>
  
</div>

<div class="container">
  <div class="weights-panel">
    <div class="weights-header">
      <div class="weights-title">Category Weights</div>
      <div class="weights-actions">
        <button class="btn btn-outline" onclick="resetWeights()">Reset Defaults</button>
        <button class="btn btn-primary" onclick="applyWeights()">Apply Weights</button>
      </div>
    </div>
    <div class="weights-grid" id="weightsGrid">
      <div class="loading"><div class="spinner"></div><span>Loading weights...</span></div>
    </div>
    <div class="total-weight-row">
      <span class="total-label">Total Weight:</span>
      <span class="total-value" id="totalWeight">0%</span>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search players...">
    </div>
    <select class="filter-sel" id="teamFilter"><option value="">All Teams</option></select>
    <select class="filter-sel" id="contractFilter"><option value="">All Contracts</option></select>
  </div>

  <div class="table-container">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-sort="rank">Rank <span class="sort-icon">↓</span></th>
            <th data-sort="contract">Contract <span class="sort-icon">↕</span></th>
            <th data-sort="player">Player <span class="sort-icon">↕</span></th>
            <th data-sort="team">Team <span class="sort-icon">↕</span></th>
            <th data-sort="etv" class="sorted">ETV <span class="sort-icon">↓</span></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5"><div class="loading"><div class="spinner"></div><span>Loading player data...</span></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const nbaIds={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHA:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};
const teamNames={ATL:'Atlanta Hawks',BOS:'Boston Celtics',BKN:'Brooklyn Nets',CHA:'Charlotte Hornets',CHI:'Chicago Bulls',CLE:'Cleveland Cavaliers',DAL:'Dallas Mavericks',DEN:'Denver Nuggets',DET:'Detroit Pistons',GSW:'Golden State Warriors',HOU:'Houston Rockets',IND:'Indiana Pacers',LAC:'LA Clippers',LAL:'Los Angeles Lakers',MEM:'Memphis Grizzlies',MIA:'Miami Heat',MIL:'Milwaukee Bucks',MIN:'Minnesota Timberwolves',NOP:'New Orleans Pelicans',NYK:'New York Knicks',OKC:'Oklahoma City Thunder',ORL:'Orlando Magic',PHI:'Philadelphia 76ers',PHX:'Phoenix Suns',POR:'Portland Trail Blazers',SAC:'Sacramento Kings',SAS:'San Antonio Spurs',TOR:'Toronto Raptors',UTA:'Utah Jazz',WAS:'Washington Wizards'};
function logoUrl(abbr){const id=nbaIds[abbr];return id?`https://cdn.nba.com/logos/nba/${id}/global/L/logo.svg`:'';}
const weightToColumn={'Contract':'Contract ETV','Performance':'Performance ETV','Age':'Age ETV'};

let rawData=[],processedData=[],weights={},defaultWeights={},sortColumn='etv',sortDirection='desc';

function parseNumber(v){if(!v&&v!==0)return 0;let s=String(v).trim();const neg=s.startsWith('(')&&s.endsWith(')');if(neg)s=s.slice(1,-1);s=s.replace(/[$,\s]/g,'');let n=parseFloat(s);if(isNaN(n))return 0;return neg?-Math.abs(n):n;}

function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=parseCSVLine(lines[0]);
  const data=[];
  for(let i=1;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]);
    if(vals.length===headers.length){const row={};headers.forEach((h,j)=>{row[h.trim()]=vals[j];});data.push(row);}
  }
  return{headers,data};
}

function parseCSVLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"')inQ=!inQ;else if(c===','&&!inQ){r.push(cur.trim());cur='';}else cur+=c;}r.push(cur.trim());return r;}

function findTeamAbbr(teamStr){
  if(!teamStr)return null;
  const up=teamStr.toUpperCase().trim();
  if(nbaIds[up])return up;
  const map={ATL:['HAWKS','ATLANTA'],BOS:['CELTICS','BOSTON'],BKN:['NETS','BROOKLYN'],CHA:['HORNETS','CHARLOTTE'],CHI:['BULLS','CHICAGO'],CLE:['CAVALIERS','CAVS','CLEVELAND'],DAL:['MAVERICKS','MAVS','DALLAS'],DEN:['NUGGETS','DENVER'],DET:['PISTONS','DETROIT'],GSW:['WARRIORS','GOLDEN STATE'],HOU:['ROCKETS','HOUSTON'],IND:['PACERS','INDIANA'],LAC:['CLIPPERS','LA CLIPPERS'],LAL:['LAKERS','LOS ANGELES LAKERS'],MEM:['GRIZZLIES','MEMPHIS'],MIA:['HEAT','MIAMI'],MIL:['BUCKS','MILWAUKEE'],MIN:['TIMBERWOLVES','WOLVES','MINNESOTA'],NOP:['PELICANS','NEW ORLEANS'],NYK:['KNICKS','NEW YORK'],OKC:['THUNDER','OKLAHOMA'],ORL:['MAGIC','ORLANDO'],PHI:['76ERS','SIXERS','PHILADELPHIA'],PHX:['SUNS','PHOENIX'],POR:['BLAZERS','TRAIL BLAZERS','PORTLAND'],SAC:['KINGS','SACRAMENTO'],SAS:['SPURS','SAN ANTONIO'],TOR:['RAPTORS','TORONTO'],UTA:['JAZZ','UTAH'],WAS:['WIZARDS','WASHINGTON']};
  for(const[abbr,ids]of Object.entries(map)){for(const id of ids){if(up.includes(id))return abbr;}}
  return null;
}

function getContractClass(t){if(!t)return'badge-default';const ct=t.toLowerCase();if(ct.includes('rookie'))return'badge-rookie';if(ct.includes('supermax'))return'badge-supermax';if(ct.includes('max'))return'badge-max';if(ct.includes('veteran'))return'badge-veteran';if(ct.includes('extension'))return'badge-extension';if(ct.includes('standard'))return'badge-standard';return'badge-default';}

function extractWeights(data){
  weights={};defaultWeights={};
  data.forEach(row=>{const n=row['Weight'];const p=row['Weight Percent'];if(n&&p){let v=parseFloat(String(p).replace('%','').trim());if(!isNaN(v)){if(v>0&&v<1)v*=100;weights[n.trim()]=v;defaultWeights[n.trim()]=v;}}});
  renderWeights();
}

function renderWeights(){
  const grid=document.getElementById('weightsGrid');
  if(!Object.keys(weights).length){grid.innerHTML='<p style="color:var(--ink-muted)">No weight data</p>';return;}
  grid.innerHTML='';
  Object.entries(weights).forEach(([name,val])=>{
    const div=document.createElement('div');div.className='weight-item';
    div.innerHTML=`<label class="weight-label">${name}</label><div class="weight-input-row"><input type="number" class="weight-input" data-weight="${name}" value="${val}" min="0" max="100" step="1"><span class="weight-suffix">%</span></div>`;
    grid.appendChild(div);
  });
  grid.querySelectorAll('.weight-input').forEach(inp=>{inp.addEventListener('input',updateTotalWeight);inp.addEventListener('change',updateTotalWeight);});
  updateTotalWeight();
}

function updateTotalWeight(){
  let total=0;document.querySelectorAll('.weight-input').forEach(inp=>total+=parseFloat(inp.value)||0);
  const el=document.getElementById('totalWeight');
  el.textContent=total.toFixed(0)+'%';
  el.className='total-value '+(Math.abs(total-100)<0.5?'valid':'invalid');
}

function resetWeights(){weights={...defaultWeights};renderWeights();recalcETV();renderTable();}

function applyWeights(){
  document.querySelectorAll('.weight-input').forEach(inp=>{weights[inp.dataset.weight]=parseFloat(inp.value)||0;});
  recalcETV();renderTable();
}

function recalcETV(){
  processedData.forEach(p=>{
    let newETV=0;
    Object.entries(weights).forEach(([wn,wp])=>{
      const col=weightToColumn[wn];
      if(col&&p.componentETVs[col]!==undefined){
        const origW=defaultWeights[wn]||0;
        if(origW>0){const base=p.componentETVs[col]/(origW/100);newETV+=base*(wp/100);}
      }
    });
    p.calculatedETV=newETV;
  });
  sortData();
}

function sortData(){
  processedData.sort((a,b)=>{
    let av,bv;
    if(sortColumn==='player'){av=a.player||'';bv=b.player||'';return sortDirection==='asc'?av.localeCompare(bv):bv.localeCompare(av);}
    if(sortColumn==='team'){av=a.team||'';bv=b.team||'';return sortDirection==='asc'?av.localeCompare(bv):bv.localeCompare(av);}
    if(sortColumn==='contract'){av=a.contractType||'';bv=b.contractType||'';return sortDirection==='asc'?av.localeCompare(bv):bv.localeCompare(av);}
    av=a.calculatedETV||0;bv=b.calculatedETV||0;
    return sortDirection==='asc'?av-bv:bv-av;
  });
  processedData.forEach((p,i)=>p.rank=i+1);
}

function processData(data){
  processedData=data.filter(row=>{
    const player=row['Player'],etv=row['Estimated Trade Value (ETV)'];
    if(!player||!etv)return false;
    return!isNaN(parseFloat(String(etv).replace(/[^0-9.-]/g,'')));
  }).map((row,idx)=>({
    rank:idx+1,contractType:row['Contract Type']||'',player:row['Player']||'',
    team:row['Team']||'',teamAbbr:findTeamAbbr(row['Team']||''),
    originalETV:parseNumber(row['Estimated Trade Value (ETV)']),
    calculatedETV:parseNumber(row['Estimated Trade Value (ETV)']),
    componentETVs:{'Contract ETV':parseNumber(row['Contract ETV']),'Performance ETV':parseNumber(row['Performance ETV']),'Age ETV':parseNumber(row['Age ETV'])}
  }));
  sortData();
  const teams=[...new Set(processedData.map(p=>p.teamAbbr).filter(Boolean))].sort();
  const contracts=[...new Set(processedData.map(p=>p.contractType).filter(Boolean))].sort();
  const tf=document.getElementById('teamFilter');tf.innerHTML='<option value="">All Teams</option>';
  teams.forEach(t=>tf.innerHTML+=`<option value="${t}">${teamNames[t]||t}</option>`);
  const cf=document.getElementById('contractFilter');cf.innerHTML='<option value="">All Contracts</option>';
  contracts.forEach(c=>cf.innerHTML+=`<option value="${c}">${c}</option>`);
}

function getFiltered(){
  const s=document.getElementById('searchInput').value.toLowerCase();
  const t=document.getElementById('teamFilter').value;
  const c=document.getElementById('contractFilter').value;
  return processedData.filter(p=>{
    if(s&&!p.player.toLowerCase().includes(s)&&!p.team.toLowerCase().includes(s))return false;
    if(t&&p.teamAbbr!==t)return false;
    if(c&&p.contractType!==c)return false;
    return true;
  });
}

function getETVColor(val,mn,mx){
  if(mn===mx)return'rgba(200,200,200,0.15)';
  const norm=(val-mn)/(mx-mn);
  if(norm<=0.5){const i=norm*2;return`rgba(200,${Math.round(50+i*80)},50,${0.15+i*0.1})`;}
  const i=(norm-0.5)*2;return`rgba(${Math.round(100-i*60)},${Math.round(100+i*80)},50,${0.15+i*0.15})`;
}

function renderTable(){
  const tbody=document.getElementById('tableBody');
  const filtered=getFiltered();
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--ink-muted);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase">No players found</td></tr>';return;}
  const etvVals=filtered.map(p=>p.calculatedETV);
  const mn=Math.min(...etvVals),mx=Math.max(...etvVals);
  tbody.innerHTML=filtered.map((p,i)=>{
    const rank=i+1;
    const logo=logoUrl(p.teamAbbr)||'';
    const teamDisplay=teamNames[p.teamAbbr]||p.team;
    const etvColor=getETVColor(p.calculatedETV,mn,mx);
    return`<tr>
      <td class="rank-cell ${rank<=10?'top-10':''}">${rank}</td>
      <td><span class="contract-badge ${getContractClass(p.contractType)}">${p.contractType||'N/A'}</span></td>
      <td><span class="player-name">${p.player}</span></td>
      <td><div class="team-cell">${logo?`<img src="${logo}" alt="${teamDisplay}" class="team-logo" onerror="this.style.display='none'">`:''}
        <span class="team-name-label">${teamDisplay}</span></div></td>
      <td><div class="etv-cell" style="background:${etvColor}"><span class="etv-value">${p.calculatedETV.toFixed(2)}</span></div></td>
    </tr>`;
  }).join('');
  updateSortHeaders();
}

function updateSortHeaders(){
  document.querySelectorAll('th[data-sort]').forEach(th=>{
    const col=th.dataset.sort;
    th.classList.toggle('sorted',col===sortColumn);
    th.querySelector('.sort-icon').textContent=col===sortColumn?(sortDirection==='asc'?'↑':'↓'):'↕';
  });
}

document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.sort;
    if(sortColumn===col)sortDirection=sortDirection==='asc'?'desc':'asc';
    else{sortColumn=col;sortDirection=col==='etv'?'desc':'asc';}
    sortData();renderTable();
  });
});
document.getElementById('searchInput').addEventListener('input',renderTable);
document.getElementById('teamFilter').addEventListener('change',renderTable);
document.getElementById('contractFilter').addEventListener('change',renderTable);

async function loadData(){
  const csvUrl='https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9jJpsamj56RIR756PoJSOaRgPSc9yDZ5nkpWUjO-ECjRMGsBq_Q-_s4vPcpfCSg/pub?gid=1384166762&single=true&output=csv';
  try{
    const resp=await fetch(csvUrl);
    if(!resp.ok)throw new Error();
    const{data}=parseCSV(await resp.text());
    rawData=data;extractWeights(data);processData(data);renderTable();
  }catch(e){
    document.getElementById('weightsGrid').innerHTML='<p style="color:var(--accent)">Error loading data</p>';
    document.getElementById('tableBody').innerHTML='<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--accent)">Failed to load data</td></tr>';
  }
}
loadData();
</script>
</body>
</html>
